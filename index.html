<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .neon-box { border: 2px solid #fff; box-shadow: 0 0 15px #fff; background: #000; border-radius: 0px; }
        .btn-neon { border: 2px solid #fff; transition: 0.3s; padding: 12px; width: 45%; }
        .btn-neon:hover { background: #fff; color: #000; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div id="app" class="w-[90%] p-6 neon-box text-center">
        <!-- Adım 1 -->
        <div id="step1">
            <h1 class="text-xl mb-4 font-bold">Adınız Nedir?</h1>
            <input id="userName" type="text" class="w-full p-2 bg-black border border-white text-white mb-4 outline-none" placeholder="İsminiz...">
            <button onclick="goToNext()" class="w-full btn-neon">Tamam</button>
        </div>

        <!-- Adım 2 -->
        <div id="step2" class="hidden">
            <p id="msg" class="text-lg mb-6"></p>
            <div id="btns" class="flex justify-between">
                <button id="btnYes" onclick="sayYes()" class="btn-neon">Evet</button>
                <button id="btnNo" onmouseover="moveNo()" onclick="moveNo()" class="btn-neon">Hayır</button>
            </div>
        </div>
    </div>

    <script>
        let name = "";
        let step = 1;
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.pitch = 0.8;
            utterance.volume = 1.0; // Maksimum ses
            synth.speak(utterance);
        }

        function goToNext() {
            name = document.getElementById('userName').value;
            if(!name) return;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('msg').innerText = "Selam " + name + ", sana bir soru soracağım!";
            speak("Selam " + name + ", sana bir soru soracağım.");
        }

        function moveNo() {
            const btn = document.getElementById('btnNo');
            btn.style.position = 'fixed';
            btn.style.top = (Math.random() * 70 + 10) + '%';
            btn.style.left = (Math.random() * 70 + 10) + '%';
        }

        function sayYes() {
            if(step === 1) {
                document.getElementById('msg').innerText = "Selam " + name + ". Ben Ali. Ablam, Halam ve Kuzenimle tatile gidebilir miyiz?";
                speak("Selam " + name + ". Ben Ali. Ablam, Halam ve Kuzenimle tatile gidebilir miyiz?");
                step = 2;
            } else {
                document.getElementById('msg').innerText = "YUPPI BILIYORDUM TEŞEKKÜRLER !";
                document.getElementById('btns').classList.add('hidden');
                confetti();
                speak("Yuppi, biliyordum! Teşekkürler " + name);
            }
        }
    </script>
</body>
</html>
