<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        /* Neon Blue Tema */
        body { background: radial-gradient(circle, #001f3f, #000000); color: #00d4ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-box { border: 2px solid #00d4ff; background: rgba(0, 20, 40, 0.7); padding: 25px; border-radius: 20px; box-shadow: 0 0 20px #00d4ff; }
        .btn-yes { background-color: #22c55e; color: white; padding: 15px; border-radius: 10px; width: 45%; font-weight: bold; transition: 0.3s; }
        .btn-no { background-color: #ef4444; color: white; padding: 15px; border-radius: 10px; width: 45%; font-weight: bold; position: relative; transition: 0.1s; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div id="app" class="w-[90%] max-w-md main-box text-center">
        <!-- Adım 1: İsim -->
        <div id="step1">
            <h1 class="text-2xl mb-4 font-bold text-white">Adınız Nedir?</h1>
            <input id="userName" type="text" class="w-full p-3 bg-blue-900 border border-blue-400 text-white rounded-lg mb-4 outline-none" placeholder="İsminizi yazın...">
            <button onclick="startApp()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-bold">Tamam</button>
        </div>

        <!-- Adım 2: Soru Akışı -->
        <div id="step2" class="hidden">
            <p id="msg" class="text-lg mb-6 font-bold text-white"></p>
            <div id="btns" class="flex justify-between">
                <button id="btnYes" onclick="handleYes()" class="btn-yes">Evet</button>
                <button id="btnNo" onmouseover="moveNo()" onclick="moveNo()" class="btn-no">Hayır</button>
            </div>
        </div>
    </div>

    <script>
        let name = "";
        let stage = 0; 
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.pitch = 0.8;
            utterance.volume = 1.0;
            synth.speak(utterance);
        }

        function startApp() {
            name = document.getElementById('userName').value;
            if(!name) return alert("İsmini yaz kanka!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            document.getElementById('msg').innerText = "Selam " + name + ", sana bir soru soracağım.";
            speak("Selam " + name + ", sana bir soru soracağım.");
        }

        function handleYes() {
            if(stage === 0) {
                document.getElementById('msg').innerText = "Selam " + name + ". Ben Ali. Sana bir soru sormak istiyorum. Ben, Ablam, Halam ve Kuzenim tatile gidebilir miyiz?";
                speak("Selam " + name + ". Ben Ali. Sana bir soru sormak istiyorum. Ben, ablam, halam ve kuzenim tatile gidebilir miyiz?");
                stage = 1;
            } else if(stage === 1) {
                document.getElementById('msg').innerText = "EMIN MISIN? ÇÜNKÜ BU KONUDA CIDDIYIM, EVDE ÇOK SIKILIYORUM LÜTFEN GIDEYIM HEMEN GERI DÖNECEĞIM";
                speak("Emin misin? Çünkü bu konuda ciddiyim. Evde çok sıkılıyorum, lütfen gideyim, hemen geri döneceğim.");
                stage = 2;
            } else if(stage === 2) {
                document.getElementById('msg').innerText = "YUPPI BILIYORDUM TEŞEKKÜRLER !";
                document.getElementById('btns').classList.add('hidden');
                confetti();
                speak("Yuppi biliyordum, teşekkürler " + name);
            }
        }

        function moveNo() {
            const btn = document.getElementById('btnNo');
            btn.style.position = 'fixed';
            btn.style.top = (Math.random() * 70 + 10) + '%';
            btn.style.left = (Math.random() * 70 + 10) + '%';
        }
    </script>
</body>
</html>
